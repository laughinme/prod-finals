openapi: 3.1.0
x-stoplight:
  id: kgp9nolq21rov
info:
  title: T-Match Public API
  version: 1.1.0
  summary: Публичный контракт для веб-клиента дейтинг-сервиса.
  description: |
    Контракт покрывает MVP-критический путь кейса:
    онбординг и минимальный профиль, фото, персональная выдача, безопасные объяснения,
    действия по карточкам, мэтч, чат, блок/жалоба, завершение контакта и пограничные состояния.

    Архитектурные правила:
    1. Только backend является источником истины по статусу контакта, мэтча, чата, блоков и запрета повторного показа.
    2. Frontend не общается с ML напрямую.
    3. Объяснения для пользователя всегда проходят через backend и могут деградировать в базовый режим без утечки чувствительных данных.
    4. Для MVP выбран формат фиксированной дневной выдачи карточек.
servers:
  - url: 'https://api.t-match.local'
    description: Main backend
security:
  - HTTPBearer: []
tags:
  - name: Auth
    description: Авторизация и выдача токенов
  - name: Users
    description: 'Текущий пользователь, профиль и avatar'
  - name: Onboarding
    description: Состояние онбординга и завершение минимального профиля
  - name: Feed
    description: Персональная выдача и реакции
  - name: Matches
    description: Совпадения и завершение контакта
  - name: Conversations
    description: Чат после мэтча
  - name: Safety
    description: Блокировки и жалобы
  - name: Languages
    description: Справочники
  - name: Admins
    description: Админские endpoint'ы шаблона
  - name: System
    description: Health / readiness / liveness
  - name: Audit
    description: Внутренний аудит для отладки и защиты
paths:
  /api/v1/auth/register:
    post:
      tags:
        - Auth
      summary: Register User
      operationId: register_user_api_v1_auth_register_post
      parameters:
        - name: X-Client
          in: header
          required: false
          schema:
            type: string
            enum:
              - web
              - mobile
            default: web
            title: X-Client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegister'
      responses:
        '201':
          description: refresh_token differs for web/mobile as in template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '409':
          description: User with provided credentials already exists
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '429':
          description: Too Many Requests
      x-stoplight:
        id: ifyug9z4q2dnb
