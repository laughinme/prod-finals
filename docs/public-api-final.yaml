openapi: 3.1.0
info:
  title: T-Match Public API (Frontend <-> Backend)
  version: 2.0.0
  summary: Финальный MVP-контракт публичного API дейтинг-сервиса.
  description: 'Контракт покрывает MVP-критический путь кейса: mock T-ID login, профиль, обязательная одна primary photo для открытия реальной выдачи, optional onboarding quiz, персональная выдача, explanation, reactions, match, чат, icebreakers, safety, audit.


    Правила:

    1. Feed открывается только когда есть минимальный профиль и одобренная avatar photo.

    2. Onboarding quiz опционален и влияет на качество рекомендаций, но не заменяет обязательную готовность профиля.

    3. Frontend не общается с ML напрямую.

    4. Все first-run состояния возвращаются как нормальные UI-state, а не как transport errors.'
servers:
- url: https://api.t-match.local
  description: Main backend
security:
- bearerAuth: []
tags:
- name: system
  description: Диагностика и служебные endpoints
- name: auth
  description: Авторизация и mock T-ID
- name: profile
  description: Профиль, avatar и персональные инсайты
- name: onboarding
  description: Optional onboarding quiz и готовность профиля
- name: feed
  description: Выдача, explanation и реакции
- name: matches
  description: Список мэтчей и завершение контакта
- name: conversations
  description: Чат и icebreakers
- name: safety
  description: Блокировки и жалобы
- name: audit
  description: Внутреннее чтение аудита для демо и защиты
- name: admin
  description: Служебные endpoints шаблона
paths:
  /api/health:
    get:
      tags:
      - system
      summary: Сводный health-check backend
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Backend healthy/degraded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackendHealthResponse'
        '503':
          description: Critical degradation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/ping:
    get:
      tags:
      - system
      summary: Liveness probe
      operationId: getPing
      security: []
      responses:
        '200':
          description: Alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PingResponse'
  /api/ready:
    get:
      tags:
      - system
      summary: Readiness probe
      operationId: getReady
      security: []
      responses:
        '200':
          description: Ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '503':
          description: Not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/auth/register:
    post:
      tags:
      - auth
      summary: Dev-only регистрация пользователя
      operationId: registerUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegister'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPairWithUser'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/login:
    post:
      tags:
      - auth
      summary: Dev-only логин
      operationId: loginUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLogin'
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPairWithUser'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/auth/demo-login:
    post:
      tags:
      - auth
      summary: Mock T-ID login для демо
      operationId: demoLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DemoLoginRequest'
      responses:
        '200':
          description: Mock user selected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPairWithUser'
        '404':
          description: Demo user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/auth/logout:
    post:
      tags:
      - auth
      summary: Завершить текущую сессию
      operationId: logout
      responses:
        '204':
          description: Logged out
  /api/v1/auth/refresh:
    post:
      tags:
      - auth
      summary: Обновить access token
      operationId: refreshToken
      requestBody:
        required: false
      responses:
        '200':
          description: Refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/users/me:
    get:
      tags:
      - profile
      summary: Получить текущего пользователя и все клиентские статусы
      operationId: getCurrentUser
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserModel'
    patch:
      tags:
      - profile
      summary: Обновить профиль и поисковые предпочтения
      operationId: patchCurrentUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPatch'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserModel'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/users/me/avatar/presign:
    post:
      tags:
      - profile
      summary: Получить presigned URL для единственной avatar photo
      operationId: presignAvatarUpload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvatarPresignRequest'
      responses:
        '200':
          description: Presigned URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvatarPresignResponse'
  /api/v1/users/me/avatar/confirm:
    post:
      tags:
      - profile
      summary: Подтвердить загрузку avatar photo и запустить модерацию
      operationId: confirmAvatarUpload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvatarConfirmRequest'
      responses:
        '200':
          description: Avatar accepted for moderation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvatarResponse'
        '422':
          description: Invalid file key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/users/me/avatar:
    get:
      tags:
      - profile
      summary: Получить текущую avatar photo
      operationId: getMyAvatar
      responses:
        '200':
          description: Avatar metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvatarResponse'
        '404':
          description: Avatar missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
      - profile
      summary: Удалить текущую avatar photo
      operationId: deleteMyAvatar
      responses:
        '204':
          description: Deleted
  /api/v1/users/me/insights:
    get:
      tags:
      - profile
      summary: Получить lifestyle insights для экрана профиля
      operationId: getMyInsights
      responses:
        '200':
          description: Insights
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInsightsResponse'
  /api/v1/onboarding/state:
    get:
      tags:
      - onboarding
      summary: Получить состояние optional quiz и обязательной готовности профиля
      operationId: getOnboardingState
      responses:
        '200':
          description: Onboarding state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingStateResponse'
  /api/v1/onboarding/config:
    get:
      tags:
      - onboarding
      summary: Конфигурация шагов onboarding quiz
      operationId: getOnboardingConfig
      responses:
        '200':
          description: Config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingConfigResponse'
  /api/v1/onboarding/answers:
    post:
      tags:
      - onboarding
      summary: Сохранить ответы на шаг onboarding quiz
      operationId: submitOnboardingAnswers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardingAnswersRequest'
      responses:
        '200':
          description: Saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingAnswersResponse'
  /api/v1/onboarding/skip:
    post:
      tags:
      - onboarding
      summary: Пропустить optional quiz
      operationId: skipOnboardingQuiz
      responses:
        '200':
          description: Skipped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingStateResponse'
  /api/v1/onboarding/resume:
    post:
      tags:
      - onboarding
      summary: Вернуться к optional quiz после skip
      operationId: resumeOnboardingQuiz
      responses:
        '200':
          description: Resumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingStateResponse'
  /api/v1/feed:
    get:
      tags:
      - feed
      summary: Получить текущую персональную выдачу либо нормальный locked/degraded UI-state
      operationId: getFeed
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 50
          default: 12
      responses:
        '200':
          description: Feed state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedResponse'
  /api/v1/feed/items/{serve_item_id}/explanation:
    get:
      tags:
      - feed
      summary: Получить безопасное explanation по конкретной карточке
      operationId: getFeedItemExplanation
      parameters:
      - name: serve_item_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Explanation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompatibilityExplanationResponse'
        '404':
          description: Card not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/feed/items/{serve_item_id}/reaction:
    post:
      tags:
      - feed
      summary: Поставить реакцию по карточке
      operationId: postFeedReaction
      parameters:
      - name: serve_item_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedReactionRequest'
      responses:
        '200':
          description: Reaction stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedReactionResponse'
        '409':
          description: Invalid pair state transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/matches:
    get:
      tags:
      - matches
      summary: Получить список активных и недавно закрытых мэтчей
      operationId: getMatches
      responses:
        '200':
          description: Matches
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchListResponse'
  /api/v1/matches/{match_id}/close:
    post:
      tags:
      - matches
      summary: Закрыть контакт без блока
      operationId: closeMatch
      parameters:
      - name: match_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloseMatchRequest'
      responses:
        '200':
          description: Closed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CloseMatchResponse'
        '409':
          description: Already closed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/conversations/{conversation_id}:
    get:
      tags:
      - conversations
      summary: Получить conversation header и состояние чата
      operationId: getConversation
      parameters:
      - name: conversation_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Conversation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationResponse'
  /api/v1/conversations/{conversation_id}/messages:
    get:
      tags:
      - conversations
      summary: Получить сообщения в чате
      operationId: getConversationMessages
      parameters:
      - name: conversation_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: cursor
        in: query
        required: false
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 50
      responses:
        '200':
          description: Messages page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationMessagesResponse'
    post:
      tags:
      - conversations
      summary: Отправить сообщение
      operationId: sendConversationMessage
      parameters:
      - name: conversation_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '201':
          description: Sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '409':
          description: Conversation closed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/conversations/{conversation_id}/icebreakers:
    get:
      tags:
      - conversations
      summary: Получить AI/templated icebreakers для старта общения
      operationId: getConversationIcebreakers
      parameters:
      - name: conversation_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Icebreakers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IcebreakersResponse'
  /api/v1/conversations/{conversation_id}/icebreakers/{icebreaker_id}/send:
    post:
      tags:
      - conversations
      summary: Отправить выбранный icebreaker как сообщение
      operationId: sendIcebreaker
      parameters:
      - name: conversation_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: icebreaker_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '201':
          description: Icebreaker sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /api/v1/blocks:
    post:
      tags:
      - safety
      summary: Заблокировать пользователя и закрыть активный контакт
      operationId: createBlock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlockRequest'
      responses:
        '200':
          description: Blocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockResponse'
  /api/v1/reports:
    post:
      tags:
      - safety
      summary: Создать жалобу; можно одновременно заблокировать
      operationId: createReport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportRequest'
      responses:
        '200':
          description: Reported
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
  /api/v1/audit/events:
    get:
      tags:
      - audit
      summary: Внутреннее чтение audit событий для демо/защиты
      operationId: getAuditEvents
      parameters:
      - name: entity_type
        in: query
        required: false
        schema:
          type: string
      - name: entity_id
        in: query
        required: false
        schema:
          type: string
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 50
      responses:
        '200':
          description: Audit page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventsResponse'
      x-internal: true
  /api/v1/languages:
    get:
      tags:
      - admin
      summary: Список доступных языков интерфейса
      operationId: getLanguages
      responses:
        '200':
          description: Languages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LanguageModel'
  /api/v1/admins/users/:
    get:
      tags:
      - admin
      summary: Служебный список пользователей
      operationId: getAdminUsers
      responses:
        '200':
          description: Users page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CursorPage_UserModel_'
      x-internal: true
  /api/v1/admins/users/{user_id}/ban:
    post:
      tags:
      - admin
      summary: Забанить пользователя в служебном режиме
      operationId: banAdminUser
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: User banned
      x-internal: true
  /api/v1/admins/users/{user_id}/roles:
    post:
      tags:
      - admin
      summary: Обновить роли пользователя
      operationId: updateAdminUserRoles
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRolesUpdate'
      responses:
        '200':
          description: Roles updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserModel'
      x-internal: true
  /api/v1/admins/stats/summary:
    get:
      tags:
      - admin
      summary: Служебная сводка по продуктовым метрикам
      operationId: getAdminStatsSummary
      responses:
        '200':
          description: Summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserStatsSummary'
      x-internal: true
  /api/v1/admins/stats/registrations:
    get:
      tags:
      - admin
      summary: Служебный график регистраций/активаций
      operationId: getAdminStatsRegistrations
      responses:
        '200':
          description: Graph
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationsGraph'
      x-internal: true
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ValidationError:
      type: object
      required:
      - loc
      - msg
      - type
      properties:
        loc:
          type: array
          items:
            oneOf:
            - type: string
            - type: integer
        msg:
          type: string
        type:
          type: string
    HTTPValidationError:
      type: object
      properties:
        detail:
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
    ErrorResponse:
      type: object
      required:
      - error_code
      - message
      - trace_id
      properties:
        error_code:
          type: string
        message:
          type: string
        trace_id:
          type: string
          format: uuid
        details:
          type: object
          additionalProperties: true
    QuizStatus:
      type: string
      enum:
      - not_started
      - in_progress
      - skipped
      - completed
    ProfileStatus:
      type: string
      enum:
      - draft
      - required_fields_missing
      - avatar_required
      - avatar_pending
      - ready
      - blocked
    RecommendationMode:
      type: string
      enum:
      - cold_start
      - behavioral
      - hybrid
    FeedState:
      type: string
      enum:
      - locked
      - ready
      - exhausted
      - degraded
    DecisionMode:
      type: string
      enum:
      - model
      - fallback
    AvatarModerationStatus:
      type: string
      enum:
      - missing
      - pending
      - approved
      - rejected
    Gender:
      type: string
      enum:
      - male
      - female
      - non_binary
      - unknown
    Goal:
      type: string
      enum:
      - serious_relationship
      - new_friends
      - casual_dates
    FeedAction:
      type: string
      enum:
      - like
      - pass
      - hide
    SafetySourceContext:
      type: string
      enum:
      - feed
      - match_list
      - conversation
      - profile
    MessageStatus:
      type: string
      enum:
      - sent
      - delivered
      - read
    ConversationStatus:
      type: string
      enum:
      - active
      - closed_by_user
      - closed_by_block
      - closed_by_report
    MatchStatus:
      type: string
      enum:
      - active
      - closed
      - blocked
    InsightStrength:
      type: string
      enum:
      - low
      - medium
      - high
    TokenPair:
      type: object
      required:
      - access_token
      - refresh_token
      - token_type
      - expires_in
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          default: bearer
        expires_in:
          type: integer
    UserLogin:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    UserRegister:
      type: object
      required:
      - email
      - password
      - display_name
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        display_name:
          type: string
          maxLength: 80
    DemoLoginRequest:
      type: object
      required:
      - demo_user_id
      properties:
        demo_user_id:
          type: string
          description: ID заранее подготовленного mock-пользователя
    AgeRange:
      type: object
      required:
      - min
      - max
      properties:
        min:
          type: integer
          minimum: 18
          maximum: 99
        max:
          type: integer
          minimum: 18
          maximum: 99
    SearchPreferences:
      type: object
      properties:
        looking_for_genders:
          type: array
          items:
