---
openapi: 3.1.0
info:
  title: T-Match Internal ML API (Backend <-> ML Service)
  summary: Внутренний контракт для ранжирования, explanations и feedback.
  description: 'Внутренний контракт между main backend и ML service.


    Main backend владеет бизнес-состоянием, ML service владеет scoring/explanations/feedback
    ingestion.'
  version: 1.0.0
servers:
- url: http://ml-service:8080
  description: ML service
paths:
  "/v1/health":
    get:
      tags:
      - health
      summary: Get Ml Health
      operationId: getMlHealth
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MlHealthResponse'
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - APIKeyHeader: []
  /v1/recommendations:
    post:
      tags:
      - recommendations
      summary: Post Recommendations
      operationId: postRecommendations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecommendationRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendationResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '422':
          description: Unprocessable Content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - APIKeyHeader: []
  /v1/interactions/swipe:
    post:
      tags:
      - feedback
      summary: Post Swipe Feedback
      operationId: postSwipeFeedback
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SwipeFeedbackRequest'
        required: true
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/AckResponse"
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /v1/interactions/match-outcome:
    post:
      tags:
      - feedback
      summary: Post Match Outcome
      operationId: postMatchOutcome
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MatchOutcomeRequest'
        required: true
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/AckResponse"
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /v1/explanations/compatibility:
    post:
      tags:
      - explanations
      summary: Post Compatibility Explanation
      operationId: postCompatibilityExplanation
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompatibilityExplanationRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompatibilityExplanationResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /v1/profile/favorites:
    post:
      tags:
      - feedback
      summary: Post Update Favorites
      operationId: postProfileFavorites
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfileUpdateRequest'
        required: true
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /v1/profile/preferences:
    post:
      tags:
      - feedback
      summary: Post Update Preferences
      operationId: postProfilePreferences
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfileUpdateRequest'
        required: true
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /v1/profiles/onboarding:
    post:
      tags:
      - onboarding
      summary: Post Onboarding
      operationId: postOnboarding
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfileUpdateRequest'
        required: true
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
  /v1/transactions/sync:
    post:
      tags:
      - onboarding
      - events
      summary: Post Sync Transactions
      description: Event-driven обновление профиля. ML-логика выполняется в фоне.
      operationId: postSyncTransactions
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionSyncRequest'
        required: true
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - APIKeyHeader: []
components:
  schemas:
    AckResponse:
      properties:
        status:
          $ref: '#/components/schemas/AckStatus'
        received_at:
          type: string
          format: date-time
          title: Received At
      additionalProperties: false
      type: object
      required:
      - status
      - received_at
      title: AckResponse
    AckStatus:
      type: string
      enum:
      - accepted
      title: AckStatus
    ClientType:
      type: string
      enum:
      - ios
      - android
      - web
      title: ClientType
    CompatibilityExplanationRequest:
      properties:
        trace_id:
          type: string
          format: uuid
          title: Trace Id
        requester_user_id:
          anyOf:
          - type: string
          - type: integer
          title: Requester User Id
        candidate_user_id:
          anyOf:
          - type: string
          - type: integer
          title: Candidate User Id
        channel:
          $ref: '#/components/schemas/ExplanationChannel'
          default: feed
        locale:
          type: string
          title: Locale
          default: ru-RU
        max_reasons:
          type: integer
          maximum: 5.0
          minimum: 1.0
          title: Max Reasons
          default: 3
      additionalProperties: false
      type: object
      required:
      - trace_id
      - requester_user_id
      - candidate_user_id
      title: CompatibilityExplanationRequest
    CompatibilityExplanationResponse:
      properties:
        trace_id:
          type: string
          format: uuid
          title: Trace Id
        candidate_user_id:
          anyOf:
          - type: string
          - type: integer
          title: Candidate User Id
        privacy_level:
          $ref: '#/components/schemas/PrivacyLevel'
        reasons:
          items:
            $ref: '#/components/schemas/ExplanationReason'
          type: array
          maxItems: 5
          minItems: 1
          title: Reasons
        privacy_checks:
          items:
            type: string
          type: array
          maxItems: 10
          title: Privacy Checks
      additionalProperties: false
      type: object
      required:
      - trace_id
      - candidate_user_id
      - privacy_level
      - reasons
      title: CompatibilityExplanationResponse
    DecisionPolicy:
      type: string
      enum:
      - daily_batch
      title: DecisionPolicy
    ErrorResponse:
      properties:
        error_code:
          type: string
          title: Error Code
        message:
          type: string
          title: Message
        details:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Details
        trace_id:
          type: string
          format: uuid
          title: Trace Id
      additionalProperties: false
      type: object
      required:
      - error_code
      - message
      - trace_id
      title: ErrorResponse
    ExclusionSet:
      properties:
        hard_exclude_user_ids:
          anyOf:
          - items:
              anyOf:
              - type: string
              - type: integer
            type: array
            maxItems: 20000
          - type: 'null'
          title: Hard Exclude User Ids
        soft_seen_user_ids:
          anyOf:
          - items:
              anyOf:
              - type: string
              - type: integer
            type: array
            maxItems: 20000
          - type: 'null'
          title: Soft Seen User Ids
      additionalProperties: false
      type: object
      title: ExclusionSet
    ExplanationChannel:
      type: string
      enum:
      - feed
      - match
      - conversation
      title: ExplanationChannel
    ExplanationReason:
      properties:
        code:
          $ref: '#/components/schemas/ExplanationReasonCode'
        template_key:
          type: string
          title: Template Key
        strength:
          $ref: '#/components/schemas/Strength'
        confidence:
          anyOf:
          - type: number
            maximum: 1.0
            minimum: 0.0
          - type: 'null'
          title: Confidence
      additionalProperties: false
      type: object
      required:
      - code
      - template_key
      - strength
      title: ExplanationReason
    ExplanationReasonCode:
      type: string
      enum:
      - lifestyle_similarity
      - activity_overlap
      - communication_style_fit
      - meetup_rhythm_fit
      - locality_fit
      title: ExplanationReasonCode
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    HardFilters:
      properties:
        age_min:
          anyOf:
          - type: integer
            maximum: 99.0
            minimum: 18.0
          - type: 'null'
          title: Age Min
        age_max:
          anyOf:
          - type: integer
            maximum: 99.0
            minimum: 18.0
          - type: 'null'
          title: Age Max
        city_id:
          anyOf:
          - type: string
          - type: 'null'
          title: City Id
        distance_km:
          anyOf:
          - type: integer
            maximum: 300.0
            minimum: 1.0
          - type: 'null'
          title: Distance Km
        genders:
          anyOf:
          - items:
              type: string
            type: array
            maxItems: 5
          - type: 'null'
          title: Genders
      additionalProperties: false
      type: object
      title: HardFilters
    HealthDecisionMode:
      type: string
      enum:
      - model
      - fallback_only
      title: HealthDecisionMode
    MatchOutcome:
      type: string
      enum:
      - match_created
      - first_message_sent
      - mutual_conversation_started
      - first_reply_within_24h
      - conversation_closed
      - block_after_match
      - report_after_match
      title: MatchOutcome
    MatchOutcomeRequest:
      properties:
        trace_id:
          type: string
          format: uuid
          title: Trace Id
        event_id:
          type: string
          format: uuid
          title: Event Id
        match_id:
          type: string
          format: uuid
          title: Match Id
        user_a_id:
          anyOf:
          - type: string
          - type: integer
          title: User A Id
        user_b_id:
          anyOf:
          - type: string
          - type: integer
          title: User B Id
        outcome:
          $ref: '#/components/schemas/MatchOutcome'
        happened_at:
          type: string
          format: date-time
          title: Happened At
      additionalProperties: false
      type: object
      required:
      - trace_id
      - event_id
      - match_id
      - user_a_id
      - user_b_id
      - outcome
      - happened_at
      title: MatchOutcomeRequest
    MlChecks:
      properties:
        ranker_loaded:
          type: boolean
          title: Ranker Loaded
        explainer_loaded:
          type: boolean
          title: Explainer Loaded
        feedback_ingest:
          type: boolean
          title: Feedback Ingest
      additionalProperties: false
      type: object
      required:
      - ranker_loaded
      - explainer_loaded
      - feedback_ingest
      title: MlChecks
    MlHealthResponse:
      properties:
        status:
          $ref: '#/components/schemas/MlStatus'
        timestamp:
          type: string
          format: date-time
          title: Timestamp
        decision_mode:
          $ref: '#/components/schemas/HealthDecisionMode'
        model_version:
          type: string
          title: Model Version
        features_version:
          type: string
          title: Features Version
        checks:
          $ref: '#/components/schemas/MlChecks'
        warnings:
          items:
            type: string
          type: array
          maxItems: 20
          title: Warnings
      additionalProperties: false
      type: object
      required:
      - status
      - timestamp
      - decision_mode
      - model_version
      - features_version
      - checks
      title: MlHealthResponse
    MlStatus:
      type: string
      enum:
      - ok
      - degraded
      - down
      title: MlStatus
    PolicyFlag:
      type: string
      enum:
      - cooldown_candidate
      - low_profile_quality
      - sparse_behavioral_data
      title: PolicyFlag
    PrivacyLevel:
      type: string
      enum:
      - safe_aggregate
      title: PrivacyLevel
    RawTransaction:
      properties:
        transaction_id:
          type: string
          title: Transaction Id
        merchant_nm:
          type: string
          title: Merchant Nm
        merchant_type_code:
          anyOf:
          - type: string
          - type: integer
          title: Merchant Type Code
        category_nm:
          anyOf:
          - type: string
          - type: 'null'
          title: Category Nm
        timestamp:
          type: string
          format: date-time
          title: Timestamp
        amount:
          type: number
          minimum: 0.0
          title: Amount
          default: 0.0
      additionalProperties: false
      type: object
      required:
      - transaction_id
      - merchant_nm
      - merchant_type_code
      - timestamp
      title: RawTransaction
    ReasonCode:
      type: string
      enum:
      - lifestyle_similarity
      - activity_overlap
      - communication_style_fit
      - meetup_rhythm_fit
      - locality_fit
      - novelty_boost
      title: ReasonCode
    ReasonSignal:
      properties:
        code:
          $ref: '#/components/schemas/ReasonCode'
        strength:
          $ref: '#/components/schemas/Strength'
        confidence:
          anyOf:
          - type: number
            maximum: 1.0
            minimum: 0.0
          - type: 'null'
          title: Confidence
      additionalProperties: false
      type: object
      required:
      - code
      - strength
      title: ReasonSignal
    RecommendationCandidate:
      properties:
        candidate_user_id:
          anyOf:
          - type: string
          - type: integer
          title: Candidate User Id
        score:
          type: number
          maximum: 1.0
          minimum: 0.0
          title: Score
        score_components:
          anyOf:
          - additionalProperties:
              type: number
            type: object
          - type: 'null'
          title: Score Components
        reason_signals:
          items:
            $ref: '#/components/schemas/ReasonSignal'
          type: array
          maxItems: 5
          minItems: 1
          title: Reason Signals
        policy_flags:
          items:
            $ref: '#/components/schemas/PolicyFlag'
          type: array
          maxItems: 10
          title: Policy Flags
      additionalProperties: false
      type: object
      required:
      - candidate_user_id
      - score
      - reason_signals
      title: RecommendationCandidate
    RecommendationContext:
      properties:
        request_ts:
          type: string
          format: date-time
          title: Request Ts
        session_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Session Id
        locale:
          anyOf:
          - type: string
          - type: 'null'
          title: Locale
        timezone:
          anyOf:
          - type: string
          - type: 'null'
          title: Timezone
        client:
          $ref: '#/components/schemas/ClientType'
        decision_policy:
          $ref: '#/components/schemas/DecisionPolicy'
      additionalProperties: false
      type: object
      required:
      - request_ts
      - client
      - decision_policy
      title: RecommendationContext
    RecommendationDecisionMode:
      type: string
      enum:
      - model
      - fallback
      title: RecommendationDecisionMode
    RecommendationRequest:
      properties:
        trace_id:
          type: string
          format: uuid
          title: Trace Id
        request_user_id:
          anyOf:
          - type: string
          - type: integer
          title: Request User Id
        limit:
          type: integer
          maximum: 2000.0
          minimum: 1.0
          title: Limit
          default: 12
        strategy:
          $ref: '#/components/schemas/Strategy'
          default: balanced
        candidate_user_ids:
          anyOf:
          - items:
              anyOf:
              - type: string
              - type: integer
            type: array
            maxItems: 5000
          - type: 'null'
          title: Candidate User Ids
        hard_filters:
          anyOf:
          - $ref: '#/components/schemas/HardFilters'
          - type: 'null'
        exclusion:
          anyOf:
          - $ref: '#/components/schemas/ExclusionSet'
          - type: 'null'
        context:
          $ref: '#/components/schemas/RecommendationContext'
      additionalProperties: false
      type: object
      required:
      - trace_id
      - request_user_id
      - context
      title: RecommendationRequest
    RecommendationResponse:
      properties:
        trace_id:
          type: string
          format: uuid
          title: Trace Id
        generated_at:
          type: string
          format: date-time
          title: Generated At
        model_version:
          type: string
          title: Model Version
        features_version:
          type: string
          title: Features Version
        decision_mode:
          $ref: '#/components/schemas/RecommendationDecisionMode'
        warnings:
          items:
            type: string
          type: array
          maxItems: 20
          title: Warnings
        candidates:
          items:
            $ref: '#/components/schemas/RecommendationCandidate'
          type: array
          maxItems: 5000
          title: Candidates
      additionalProperties: false
      type: object
      required:
      - trace_id
      - generated_at
      - model_version
      - features_version
      - decision_mode
      title: RecommendationResponse
    Strategy:
      type: string
      enum:
      - balanced
      - high_precision
      - exploration
      title: Strategy
    Strength:
      type: string
      enum:
      - low
      - medium
      - high
      title: Strength
    SwipeAction:
      type: string
      enum:
      - like
      - pass
      - hide
      - block
      - report
      title: SwipeAction
    SwipeFeedbackRequest:
      properties:
        trace_id:
          type: string
          format: uuid
          title: Trace Id
        event_id:
          type: string
          format: uuid
          title: Event Id
        actor_user_id:
          anyOf:
          - type: string
          - type: integer
          title: Actor User Id
        target_user_id:
          anyOf:
          - type: string
          - type: integer
          title: Target User Id
        action:
          $ref: '#/components/schemas/SwipeAction'
        shown_rank:
          anyOf:
          - type: integer
            maximum: 100.0
            minimum: 1.0
          - type: 'null'
          title: Shown Rank
        shown_score:
          anyOf:
          - type: number
            maximum: 1.0
            minimum: 0.0
          - type: 'null'
          title: Shown Score
        shown_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Shown At
        acted_at:
          type: string
          format: date-time
          title: Acted At
        source_context:
          $ref: '#/components/schemas/SwipeSourceContext'
          default: feed
      additionalProperties: false
      type: object
      required:
      - trace_id
      - event_id
      - actor_user_id
      - target_user_id
      - action
      - acted_at
      title: SwipeFeedbackRequest
    SwipeSourceContext:
      type: string
      enum:
      - feed
      - conversation
      - match_list
      - safety_sheet
      title: SwipeSourceContext
    TransactionSyncRequest:
      properties:
        trace_id:
          type: string
          format: uuid
          title: Trace Id
        user_id:
          anyOf:
          - type: string
          - type: integer
          title: User Id
        transactions:
          items:
            $ref: '#/components/schemas/RawTransaction'
          type: array
          maxItems: 1000
          minItems: 1
          title: Transactions
      additionalProperties: false
      type: object
      required:
      - trace_id
      - user_id
      - transactions
      title: TransactionSyncRequest
    UserProfileUpdateRequest:
      properties:
        trace_id:
          type: string
          format: uuid
          title: Trace Id
        user_id:
          anyOf:
          - type: string
          - type: integer
          title: User Id
        favorite_categories:
          items:
            type: string
          type: array
          maxItems: 15
          minItems: 1
          title: Favorite Categories
        import_transactions:
          type: boolean
          title: Import Transactions
          description: Флаг согласия на импорт банковских транзакций
          default: false
        preferred_activity_hour:
          anyOf:
          - type: number
            maximum: 23.0
            minimum: 0.0
          - type: 'null'
          title: Preferred Activity Hour
      additionalProperties: false
      type: object
      required:
      - trace_id
      - user_id
      - favorite_categories
      title: UserProfileUpdateRequest
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
  securitySchemes:
    APIKeyHeader:
      type: apiKey
      in: header
      name: X-Service-Token
