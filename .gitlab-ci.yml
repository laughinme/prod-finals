stages:
  - test
  - deploy

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_CACHE_DIR: "1"
  POETRY_NO_INTERACTION: "1"
  POETRY_VIRTUALENVS_CREATE: "false"
  DEPLOY_PATH: "/opt/chupapis"
  DEPLOY_PORT: "22"

backend:test:
  stage: test
  image: python:3.13-slim
  before_script:
    - cd backend
    - pip install "poetry==2.3.2"
    - poetry install --with dev --no-root
  script:
    - poetry run ruff check src tests --select E9,F63,F7
    - poetry run pytest -m unit -q
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

deploy:production:
  stage: deploy
  image: alpine:3.20
  needs:
    - backend:test
  environment:
    name: production
  before_script:
    - apk add --no-cache bash openssh-client rsync sshpass
    - test -n "$DEPLOY_HOST"
    - test -n "$DEPLOY_USER"
    - test -n "$PROD_ENV_FILE"
    - |
      if [ -n "${DEPLOY_SSH_PRIVATE_KEY_FILE:-}" ]; then
        export DEPLOY_AUTH_MODE="key-file"
        export DEPLOY_KEY_PATH="$CI_PROJECT_DIR/.deploy_ssh_key"
        tr -d '\r' < "$DEPLOY_SSH_PRIVATE_KEY_FILE" > "$DEPLOY_KEY_PATH"
      elif [ -n "${DEPLOY_SSH_PRIVATE_KEY:-}" ]; then
        export DEPLOY_AUTH_MODE="key-inline"
        export DEPLOY_KEY_PATH="$CI_PROJECT_DIR/.deploy_ssh_key"
        printf '%s' "$DEPLOY_SSH_PRIVATE_KEY" \
          | sed 's/\\n/\n/g' \
          | tr -d '\r' > "$DEPLOY_KEY_PATH"
      elif [ -n "${DEPLOY_PASSWORD:-}" ]; then
        export DEPLOY_AUTH_MODE="password"
      else
        echo "One auth variable is required: DEPLOY_SSH_PRIVATE_KEY_FILE, DEPLOY_SSH_PRIVATE_KEY, or DEPLOY_PASSWORD." >&2
        exit 1
      fi
    - |
      if [ "${DEPLOY_AUTH_MODE:-}" != "password" ]; then
        chmod 600 "$DEPLOY_KEY_PATH"
        if ! grep -q "BEGIN .*PRIVATE KEY" "$DEPLOY_KEY_PATH"; then
          echo "SSH key is invalid: expected private key content (BEGIN ... PRIVATE KEY)." >&2
          exit 1
        fi
        if ! ssh-keygen -y -f "$DEPLOY_KEY_PATH" >/dev/null 2>&1; then
          echo "SSH key is unreadable. Check key format/newlines or remove passphrase." >&2
          exit 1
        fi
      fi
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - |
      if [ -n "${DEPLOY_SSH_KNOWN_HOSTS:-}" ]; then
        printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
      else
        if ! ssh-keyscan -T 10 -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" > ~/.ssh/known_hosts; then
          echo "Failed to fetch SSH host key from $DEPLOY_HOST:$DEPLOY_PORT." >&2
          echo "Check that DEPLOY_HOST points to the new VM and that SSH on port $DEPLOY_PORT is reachable from GitLab CI." >&2
          exit 1
        fi
      fi
    - chmod 600 ~/.ssh/known_hosts
  script:
    - |
      DEPLOY_ENV_FILE="$CI_PROJECT_DIR/.deploy.env"
      cp "$PROD_ENV_FILE" "$DEPLOY_ENV_FILE"

      upsert_deploy_env() {
        local key="$1"
        local value="${!key:-}"
        if [ -z "$value" ]; then
          return
        fi
        sed -i "/^${key}=/d" "$DEPLOY_ENV_FILE"
        printf '%s=%s\n' "$key" "$value" >> "$DEPLOY_ENV_FILE"
      }

      upsert_deploy_env ML_TRAIN_DATA_URL
      upsert_deploy_env ML_TRAIN_ON_START
      upsert_deploy_env ML_TRAIN_REQUIRED
      upsert_deploy_env ML_TRAIN_DATA_PATH
      upsert_deploy_env ML_MODEL_ARTIFACT_PATH
      upsert_deploy_env ML_TRAIN_DOWNLOAD_TIMEOUT_SEC

      if [ "${DEPLOY_AUTH_MODE:-}" = "password" ]; then
        export SSHPASS="$DEPLOY_PASSWORD"
        RSYNC_RSH="sshpass -e ssh -p $DEPLOY_PORT -o StrictHostKeyChecking=yes -o PubkeyAuthentication=no -o PreferredAuthentications=password" \
        rsync -az --delete \
          --exclude '.git/' \
          --exclude '.venv/' \
          --exclude '__pycache__/' \
          --exclude '.pytest_cache/' \
          --exclude 'backend/.venv/' \
          --exclude 'backend/.env' \
          --exclude 'backend/secrets/' \
          --exclude 'deploy/.env' \
          ./ \
          "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

        sshpass -e scp -P "$DEPLOY_PORT" \
          -o StrictHostKeyChecking=yes \
          -o PubkeyAuthentication=no \
          -o PreferredAuthentications=password \
          "$DEPLOY_ENV_FILE" \
          "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/deploy/.env"

        sshpass -e ssh -p "$DEPLOY_PORT" \
          -o StrictHostKeyChecking=yes \
          -o PubkeyAuthentication=no \
          -o PreferredAuthentications=password \
          "$DEPLOY_USER@$DEPLOY_HOST" \
          "cd '$DEPLOY_PATH' && bash deploy/remote-deploy.sh"
      else
        RSYNC_RSH="ssh -i $DEPLOY_KEY_PATH -p $DEPLOY_PORT -o StrictHostKeyChecking=yes -o IdentitiesOnly=yes" \
        rsync -az --delete \
          --exclude '.git/' \
          --exclude '.venv/' \
          --exclude '__pycache__/' \
          --exclude '.pytest_cache/' \
          --exclude 'backend/.venv/' \
          --exclude 'backend/.env' \
          --exclude 'backend/secrets/' \
          --exclude 'deploy/.env' \
          ./ \
          "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

        scp -i "$DEPLOY_KEY_PATH" -P "$DEPLOY_PORT" \
          -o StrictHostKeyChecking=yes \
          -o IdentitiesOnly=yes \
          "$DEPLOY_ENV_FILE" \
          "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/deploy/.env"

        ssh -i "$DEPLOY_KEY_PATH" -p "$DEPLOY_PORT" \
          -o StrictHostKeyChecking=yes \
          -o IdentitiesOnly=yes \
          "$DEPLOY_USER@$DEPLOY_HOST" \
          "cd '$DEPLOY_PATH' && bash deploy/remote-deploy.sh"
      fi
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: manual
    - if: '$CI_COMMIT_TAG'
      when: manual
