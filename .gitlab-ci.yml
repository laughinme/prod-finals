stages:
  - test
  - deploy

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_CACHE_DIR: "1"
  POETRY_NO_INTERACTION: "1"
  POETRY_VIRTUALENVS_CREATE: "false"
  DEPLOY_PATH: "/opt/chupapis"
  DEPLOY_PORT: "22"

backend:test:
  stage: test
  image: python:3.13-slim
  before_script:
    - cd backend
    - pip install "poetry==2.3.2"
    - poetry install --with dev --no-root
  script:
    - poetry run ruff check src tests --select E9,F63,F7
    - poetry run pytest -m unit -q
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

deploy:production:
  stage: deploy
  image: alpine:3.20
  needs:
    - backend:test
  environment:
    name: production
  before_script:
    - apk add --no-cache bash openssh-client rsync sshpass
    - test -n "$DEPLOY_HOST"
    - test -n "$DEPLOY_USER"
    - test -n "$DEPLOY_PASSWORD"
    - test -n "$PROD_ENV_FILE"
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - |
      if [ -n "${DEPLOY_SSH_KNOWN_HOSTS:-}" ]; then
        printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
      else
        ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" > ~/.ssh/known_hosts
      fi
    - chmod 600 ~/.ssh/known_hosts
  script:
    - >
      SSHPASS="$DEPLOY_PASSWORD"
      RSYNC_RSH="sshpass -e ssh -p $DEPLOY_PORT -o StrictHostKeyChecking=yes -o PubkeyAuthentication=no"
      rsync -az --delete
      --exclude '.git/'
      --exclude '.venv/'
      --exclude '__pycache__/'
      --exclude '.pytest_cache/'
      --exclude 'backend/.venv/'
      --exclude 'backend/.env'
      --exclude 'backend/secrets/'
      --exclude 'deploy/.env'
      ./
      "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"
    - >
      SSHPASS="$DEPLOY_PASSWORD"
      sshpass -e scp -P "$DEPLOY_PORT"
      -o StrictHostKeyChecking=yes
      -o PubkeyAuthentication=no
      "$PROD_ENV_FILE"
      "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/deploy/.env"
    - >
      SSHPASS="$DEPLOY_PASSWORD"
      sshpass -e ssh -p "$DEPLOY_PORT"
      -o StrictHostKeyChecking=yes
      -o PubkeyAuthentication=no
      "$DEPLOY_USER@$DEPLOY_HOST"
      "cd '$DEPLOY_PATH' && bash deploy/remote-deploy.sh"
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: manual
    - if: '$CI_COMMIT_TAG'
      when: manual
