services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-chupapis}-backend
    environment:
      APP_STAGE: ${APP_STAGE:-prod}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-false}
      API_HOST: 0.0.0.0
      API_PORT: 8080
      SITE_URL: ${SITE_URL:?SITE_URL_is_required}
      MAX_PHOTO_SIZE: ${MAX_PHOTO_SIZE:-5}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL_is_required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL_is_required}
      STORAGE_ENDPOINT_INTERNAL: ${STORAGE_ENDPOINT_INTERNAL:-http://minio:9000}
      STORAGE_ENDPOINT_PUBLIC: ${STORAGE_ENDPOINT_PUBLIC:?STORAGE_ENDPOINT_PUBLIC_is_required}
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:?STORAGE_ACCESS_KEY_is_required}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:?STORAGE_SECRET_KEY_is_required}
      STORAGE_PUBLIC_BUCKET: ${STORAGE_PUBLIC_BUCKET:-media-public}
      STORAGE_PRIVATE_BUCKET: ${STORAGE_PRIVATE_BUCKET:-media-private}
      STORAGE_PRESIGN_EXPIRES_SEC: ${STORAGE_PRESIGN_EXPIRES_SEC:-600}
      STORAGE_USE_PATH_STYLE: ${STORAGE_USE_PATH_STYLE:-true}
      STORAGE_AUTO_CREATE_BUCKETS: ${STORAGE_AUTO_CREATE_BUCKETS:-true}
      NOTIFICATIONS_PROVIDER: ${NOTIFICATIONS_PROVIDER:-noop}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET_is_required}
      JWT_ALGO: ${JWT_ALGO:-HS256}
      CSRF_HMAC_KEY: ${CSRF_HMAC_KEY:?CSRF_HMAC_KEY_is_required}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      COOKIE_PATH: ${COOKIE_PATH:-/}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-}
      CORS_ALLOW_ORIGIN_REGEX: ${CORS_ALLOW_ORIGIN_REGEX:-}
      DEMO_ADMIN_EMAIL: ${DEMO_ADMIN_EMAIL:-admin@demo.local}
      DEMO_ADMIN_PASSWORD: ${DEMO_ADMIN_PASSWORD:-Admin12345!}
      DEMO_ADMIN_USERNAME: ${DEMO_ADMIN_USERNAME:-Demo Admin}
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:-*}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: ${COMPOSE_PROJECT_NAME:-chupapis}-nginx
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_started
      minio:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-chupapis}-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD_is_required}
      POSTGRES_DB: ${POSTGRES_DB:-chupapis}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-chupapis}-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: ${COMPOSE_PROJECT_NAME:-chupapis}-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER_is_required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD_is_required}
    volumes:
      - minio_data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -ec
      - |
        until mc alias set local http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do sleep 1; done
        mc mb --ignore-existing local/${STORAGE_PUBLIC_BUCKET:-media-public}
        mc mb --ignore-existing local/${STORAGE_PRIVATE_BUCKET:-media-private}
        mc anonymous set download local/${STORAGE_PUBLIC_BUCKET:-media-public}
        echo 'MinIO buckets are ready'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER_is_required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD_is_required}
      STORAGE_PUBLIC_BUCKET: ${STORAGE_PUBLIC_BUCKET:-media-public}
      STORAGE_PRIVATE_BUCKET: ${STORAGE_PRIVATE_BUCKET:-media-private}
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  minio_data:
