services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ${COMPOSE_PROJECT_NAME:-chupapis}-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    ports:
      - "6333:6333"

  ml-service:
    build:
      context: .
      dockerfile: ml/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-chupapis}-ml-service
    env_file:
      - ./deploy/.env
    depends_on:
      - qdrant
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8080
      QDRANT_URL: http://qdrant:6333
      ML_SERVICE_TOKEN: ${ML_SERVICE_TOKEN:-change-me-ml-token}
      ML_SAMPLE_USER_COUNT: ${ML_SAMPLE_USER_COUNT:-120}
      ML_SAMPLE_TX_PER_USER: ${ML_SAMPLE_TX_PER_USER:-20}
      ML_SAMPLE_SEED: ${ML_SAMPLE_SEED:-42}
      ML_FEATURES_VERSION: ${ML_FEATURES_VERSION:-features_v1}
      ML_MODEL_ARTIFACT_PATH: ${ML_MODEL_ARTIFACT_PATH:-/app/ml/artifacts/model.json}
      ML_TRAIN_ON_START: ${ML_TRAIN_ON_START:-false}
      ML_TRAIN_REQUIRED: ${ML_TRAIN_REQUIRED:-false}
      ML_TRAIN_DATA_URL: ${ML_TRAIN_DATA_URL:-}
      ML_TRAIN_DATA_PATH: ${ML_TRAIN_DATA_PATH:-/app/ml/data/train.csv}
      ML_TRAIN_ARCHIVE_MEMBER: ${ML_TRAIN_ARCHIVE_MEMBER:-}
      ML_TRAIN_DOWNLOAD_TIMEOUT_SEC: ${ML_TRAIN_DOWNLOAD_TIMEOUT_SEC:-120}
      ML_MODEL_UPLOAD_REQUIRED: ${ML_MODEL_UPLOAD_REQUIRED:-false}
      ML_MODEL_S3_ENDPOINT: ${ML_MODEL_S3_ENDPOINT:-}
      ML_MODEL_S3_REGION: ${ML_MODEL_S3_REGION:-}
      ML_MODEL_S3_ACCESS_KEY: ${ML_MODEL_S3_ACCESS_KEY:-}
      ML_MODEL_S3_SECRET_KEY: ${ML_MODEL_S3_SECRET_KEY:-}
      ML_MODEL_S3_BUCKET: ${ML_MODEL_S3_BUCKET:-}
      ML_MODEL_S3_PREFIX: ${ML_MODEL_S3_PREFIX:-ml-models}
      ML_MODEL_S3_KEY: ${ML_MODEL_S3_KEY:-}
      ML_MODEL_S3_SECURE: ${ML_MODEL_S3_SECURE:-}
      ML_MODEL_S3_FORCE_PATH_STYLE: ${ML_MODEL_S3_FORCE_PATH_STYLE:-true}
      STORAGE_ENDPOINT_INTERNAL: ${STORAGE_ENDPOINT_INTERNAL:-http://minio:9000}
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-change-me}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-change-me}
      STORAGE_PRIVATE_BUCKET: ${STORAGE_PRIVATE_BUCKET:-media-private}
    volumes:
      - ml_artifacts:/app/ml/artifacts
      - ml_data:/app/ml/data
    healthcheck:
      test: >-
        python -c 'import os, urllib.request; req = urllib.request.Request("http://127.0.0.1:8080/v1/health", headers={"X-Service-Token": os.environ.get("ML_SERVICE_TOKEN", "change-me-ml-token")}); urllib.request.urlopen(req, timeout=5)'
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-chupapis}-backend
    env_file:
      - ./deploy/.env
    environment:
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
      ML_SERVICE_URL: ${ML_SERVICE_URL:-http://ml-service:8080}
      ML_SERVICE_TOKEN: ${ML_SERVICE_TOKEN:-change-me-ml-token}
    depends_on:
      ml-service:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      centrifugo:
        condition: service_started
    healthcheck:
      test: >-
        python -c 'import urllib.request; urllib.request.urlopen("http://127.0.0.1:8080/api/health", timeout=5)'
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  caddy:
    build:
      context: .
      dockerfile: caddy/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: ${COMPOSE_PROJECT_NAME:-chupapis}-caddy
    environment:
      SITE_URL: ${SITE_URL:-https://app.example.com}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    depends_on:
      backend:
        condition: service_healthy
      minio:
        condition: service_started
      centrifugo:
        condition: service_started
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-chupapis}-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-chupapis}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-chupapis}-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  centrifugo:
    image: centrifugo/centrifugo:latest
    container_name: ${COMPOSE_PROJECT_NAME:-chupapis}-centrifugo
    environment:
      CENTRIFUGO_CLIENT_TOKEN_HMAC_SECRET_KEY: ${CENTRIFUGO_TOKEN_HMAC_SECRET:-change-me-centrifugo-token-secret}
      CENTRIFUGO_CLIENT_ALLOWED_ORIGINS: ${CENTRIFUGO_ALLOWED_ORIGINS:-https://team-26-prod-5df88b.pages.prodcontest.ru}
      CENTRIFUGO_HTTP_API_KEY: ${CENTRIFUGO_API_KEY:-change-me-centrifugo-api-key}
      CENTRIFUGO_ADMIN_ENABLED: "false"
      CENTRIFUGO_ENGINE_TYPE: memory
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: ${COMPOSE_PROJECT_NAME:-chupapis}-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-change-me}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-change-me}
    volumes:
      - minio_data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -ec
      - |
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do sleep 1; done
        mc mb --ignore-existing local/${STORAGE_PUBLIC_BUCKET:-media-public}
        mc mb --ignore-existing local/${STORAGE_PRIVATE_BUCKET:-media-private}
        mc anonymous set download local/${STORAGE_PUBLIC_BUCKET:-media-public}
        echo 'MinIO buckets are ready'
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-change-me}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-change-me}
      STORAGE_PUBLIC_BUCKET: ${STORAGE_PUBLIC_BUCKET:-media-public}
      STORAGE_PRIVATE_BUCKET: ${STORAGE_PRIVATE_BUCKET:-media-private}
    restart: "no"

volumes:
  caddy_config:
  caddy_data:
  postgres_data:
  redis_data:
  minio_data:
  ml_artifacts:
  ml_data:
  qdrant_data:
