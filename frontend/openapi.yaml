openapi: 3.1.0
info:
  title: Backend Template
  version: 0.1.0
paths:
  /api/v1/auth/register:
    post:
      tags:
        - Auth
      summary: Register User
      operationId: register_user_api_v1_auth_register_post
      parameters:
        - name: X-Client
          in: header
          required: false
          schema:
            enum:
              - web
              - mobile
            type: string
            default: web
            title: X-Client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegister'
      responses:
        '201':
          description: >-
            refresh_token field varies depending on the source of request. For
            web it is always null and being set as httponly cookie, however any
            other platform gets access and refresh tokens in response body. It
            is made to protect web from xss and csrf attacks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '409':
          description: User with provided credentials already exists
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '429':
          description: Too Many Requests
  /api/v1/auth/login:
    post:
      tags:
        - Auth
      summary: Authenticate user and issue tokens
      operationId: login_user_api_v1_auth_login_post
      parameters:
        - name: X-Client
          in: header
          required: false
          schema:
            enum:
              - web
              - mobile
            type: string
            default: web
            title: X-Client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLogin'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          description: Wrong credentials
        '403':
          description: Forbidden
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '429':
          description: Too Many Requests
  /api/v1/auth/logout:
    post:
      tags:
        - Auth
      summary: Logout
      operationId: logout_api_v1_auth_logout_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Logout Api V1 Auth Logout Post
        '401':
          description: Not authorized
        '403':
          description: Forbidden
        '429':
          description: Too Many Requests
      security:
        - HTTPBearer: []
  /api/v1/auth/refresh:
    post:
      tags:
        - Auth
      summary: Rotate tokens
      operationId: refresh_tokens_api_v1_auth_refresh_post
      security:
        - HTTPBearer: []
      parameters:
        - name: X-CSRF-Token
          in: header
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            description: Must only be passed for requests from browsers
            title: X-Csrf-Token
          description: Must only be passed for requests from browsers
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '429':
          description: Too Many Requests
  /api/v1/users/me:
