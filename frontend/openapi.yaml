openapi: 3.1.0
info:
  title: T-Match Public API (Template-aligned)
  version: 1.1.0
  summary: Публичный контракт frontend <-> backend, выровненный под существующий backend
    template.
  description: 'Контракт сохраняет стиль существующего шаблона: /api/v1/users/me,
    auth/register/login/logout/refresh, avatar presign/confirm, health/ping/ready,
    languages и admin endpoints. Поверх этого добавлены доменные endpoint''ы MVP для
    дейтинг-сервиса: onboarding, feed, explanations, matches, conversations, blocks,
    reports и audit.'
servers:
- url: https://api.t-match.local
  description: Main backend
security:
- HTTPBearer: []
tags:
- name: Auth
  description: Авторизация и выдача токенов
- name: Users
  description: Текущий пользователь, профиль и avatar
- name: Onboarding
  description: Состояние онбординга и завершение минимального профиля
- name: Feed
  description: Персональная выдача и реакции
- name: Matches
  description: Совпадения и завершение контакта
- name: Conversations
  description: Чат после мэтча
- name: Safety
  description: Блокировки и жалобы
- name: Languages
  description: Справочники
- name: Admins
  description: Админские endpoint'ы шаблона
- name: System
  description: Health / readiness / liveness
- name: Audit
  description: Внутренний аудит для отладки и защиты
paths:
  /api/v1/auth/register:
    post:
      tags:
      - Auth
      summary: Register User
      operationId: register_user_api_v1_auth_register_post
      parameters:
      - name: X-Client
        in: header
        required: false
        schema:
          type: string
          enum:
          - web
          - mobile
          default: web
          title: X-Client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegister'
      responses:
        '201':
          description: refresh_token differs for web/mobile as in template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '429':
          description: Too Many Requests
        '409':
          description: User with provided credentials already exists
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/login:
    post:
      tags:
      - Auth
      summary: Authenticate user and issue tokens
      operationId: login_user_api_v1_auth_login_post
      parameters:
      - name: X-Client
        in: header
        required: false
        schema:
          type: string
          enum:
          - web
          - mobile
          default: web
          title: X-Client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLogin'
      responses:
        '200':
          description: refresh_token differs for web/mobile as in template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          description: Wrong credentials
        '403':
          description: Forbidden
        '429':
          description: Too Many Requests
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/logout:
    post:
      tags:
      - Auth
      summary: Logout
      operationId: logout_api_v1_auth_logout_post
      security:
      - HTTPBearer: []
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Logout Api V1 Auth Logout Post
        '401':
          description: Not authorized
        '403':
          description: Forbidden
        '429':
          description: Too Many Requests
  /api/v1/auth/refresh:
    post:
      tags:
      - Auth
      summary: Rotate tokens
      operationId: refresh_tokens_api_v1_auth_refresh_post
      security:
      - HTTPBearer: []
      parameters:
      - name: X-CSRF-Token
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Csrf-Token
          description: Must only be passed for requests from browsers
        description: Must only be passed for requests from browsers
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '429':
          description: Too Many Requests
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/auth/demo-login:
    post:
      tags:
      - Auth
      summary: Issue token pair for demo user
      operationId: demo_login_api_v1_auth_demo_login_post
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DemoLoginRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPairWithUser'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/users/me:
    get:
      tags:
      - Users
      summary: Get current user account and dating profile state
      operationId: profile_api_v1_users_me_get
      security:
      - HTTPBearer: []
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserModel'
        '401':
          description: Not authorized
    patch:
      tags:
      - Users
      summary: Update current user account/profile
      description: Единый PATCH для сохранения шагов онбординга и последующего редактирования
        профиля. Поля account и dating-profile лежат в одной сущности UserModel.
      operationId: update_profile_api_v1_users_me_patch
      security:
      - HTTPBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPatch'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserModel'
        '401':
          description: Not authorized
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/users/me/avatar/presign:
    post:
      tags:
      - Users
      summary: Create presigned URL for primary avatar upload
      description: В MVP avatar является обязательным primary photo пользователя.
      operationId: create_avatar_presigned_upload_api_v1_users_me_avatar_presign_post
      security:
      - HTTPBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvatarPresignRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvatarPresignResponse'
        '401':
          description: Not authorized
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/users/me/avatar/confirm:
    post:
      tags:
      - Users
      summary: Confirm uploaded avatar and attach it to profile
      operationId: confirm_avatar_upload_api_v1_users_me_avatar_confirm_post
      security:
      - HTTPBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AvatarConfirmRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserModel'
        '401':
          description: Not authorized
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/users/me/avatar:
    delete:
      tags:
      - Users
      summary: Remove current user avatar
      description: Удаление avatar снова делает пользователя неготовым к выдаче, пока
        не будет подтверждено новое фото.
      operationId: delete_avatar_api_v1_users_me_avatar_delete
      security:
      - HTTPBearer: []
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserModel'
        '401':
          description: Not authorized
  /api/v1/onboarding/state:
    get:
      tags:
      - Onboarding
      summary: Get onboarding state and next required step
      operationId: get_onboarding_state_api_v1_onboarding_state_get
      security:
      - HTTPBearer: []
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingStateResponse'
        '401':
          description: Not authorized
  /api/v1/onboarding/finish:
    post:
      tags:
      - Onboarding
      summary: Finish onboarding if minimal profile is complete
      operationId: finish_onboarding_api_v1_onboarding_finish_post
      security:
      - HTTPBearer: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmptyObject'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingFinishResponse'
        '401':
          description: Not authorized
        '409':
          description: Onboarding not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/feed:
    get:
      tags:
      - Feed
      summary: Get daily personalized feed
      operationId: get_feed_api_v1_feed_get
      security:
      - HTTPBearer: []
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 20
          default: 12
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedResponse'
        '401':
          description: Not authorized
        '409':
          description: Feed locked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/feed/items/{serve_item_id}/explanation:
    get:
      tags:
      - Feed
      summary: Get safe compatibility explanation for served card
      operationId: get_feed_item_explanation_api_v1_feed_items_serve_item_id_explanation_get
      security:
      - HTTPBearer: []
      parameters:
      - name: serve_item_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Serve Item Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompatibilityExplanationResponse'
        '401':
          description: Not authorized
        '404':
          description: Card not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/feed/items/{serve_item_id}/reaction:
    post:
      tags:
      - Feed
      summary: Submit reaction to card
      operationId: post_feed_reaction_api_v1_feed_items_serve_item_id_reaction_post
      security:
      - HTTPBearer: []
      parameters:
      - name: serve_item_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Serve Item Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedReactionRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedReactionResponse'
        '401':
          description: Not authorized
        '404':
          description: Card not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Card already processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/matches:
    get:
      tags:
      - Matches
      summary: Get current user's matches
      operationId: get_matches_api_v1_matches_get
      security:
      - HTTPBearer: []
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchListResponse'
        '401':
          description: Not authorized
  /api/v1/matches/{match_id}/close:
    post:
      tags:
      - Matches
      summary: Close match without blocking
      operationId: close_match_api_v1_matches_match_id_close_post
      security:
      - HTTPBearer: []
      parameters:
      - name: match_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Match Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloseMatchRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CloseMatchResponse'
        '401':
          description: Not authorized
        '404':
          description: Match not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Invalid state transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/conversations/{conversation_id}:
    get:
      tags:
      - Conversations
      summary: Get conversation metadata
      operationId: get_conversation_api_v1_conversations_conversation_id_get
      security:
      - HTTPBearer: []
      parameters:
      - name: conversation_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Conversation Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationResponse'
        '401':
          description: Not authorized
        '404':
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/conversations/{conversation_id}/messages:
    get:
      tags:
      - Conversations
      summary: Get conversation messages
      operationId: get_conversation_messages_api_v1_conversations_conversation_id_messages_get
      security:
      - HTTPBearer: []
      parameters:
      - name: conversation_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Conversation Id
      - name: cursor
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Cursor
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 50
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationMessagesResponse'
        '401':
          description: Not authorized
        '404':
          description: Conversation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - Conversations
      summary: Send message to conversation
      operationId: post_conversation_message_api_v1_conversations_conversation_id_messages_post
      security:
      - HTTPBearer: []
      parameters:
      - name: conversation_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Conversation Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Not authorized
        '409':
          description: Conversation unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Message blocked by safety or validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/blocks:
    post:
      tags:
      - Safety
      summary: Block a user
      operationId: post_block_api_v1_blocks_post
      security:
      - HTTPBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlockRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockResponse'
        '401':
          description: Not authorized
        '409':
          description: Already blocked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/reports:
    post:
      tags:
      - Safety
      summary: Report a user
      operationId: post_report_api_v1_reports_post
      security:
      - HTTPBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
        '401':
          description: Not authorized
        '422':
          description: Validation or moderation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/audit/events:
    get:
      tags:
      - Audit
      summary: Read audit events by entity
      operationId: get_audit_events_api_v1_audit_events_get
      x-internal: true
      security:
      - HTTPBearer: []
      parameters:
      - name: entity_type
        in: query
        required: true
        schema:
          type: string
          enum:
          - user
          - feed_item
          - pair
          - match
          - conversation
          - block
          - report
          title: Entity Type
      - name: entity_id
        in: query
        required: true
        schema:
          type: string
          title: Entity Id
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 200
          default: 50
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventsResponse'
        '401':
          description: Not authorized
  /api/v1/languages:
    get:
      tags:
      - Languages
      summary: List languages with search
      operationId: list_languages_api_v1_languages_get
      parameters:
      - name: query
        in: query
        required: false
        schema:
          type: string
          maxLength: 50
          default: ''
          title: Query
      - name: limit
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
            maximum: 50
            minimum: 1
          - type: 'null'
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LanguageModel'
                title: Response List Languages Api V1 Languages Get
        '401':
          description: Not authorized
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/admins/users/:
    get:
      tags:
      - Admins
      summary: List users with filters and search (cursor pagination)
      operationId: list_users_api_v1_admins_users__get
      security:
      - HTTPBearer: []
      parameters:
      - name: banned
        in: query
        required: false
        schema:
          anyOf:
          - type: boolean
          - type: 'null'
          description: Filter by banned status
          title: Banned
        description: Filter by banned status
      - name: search
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Search by username or email
          title: Search
        description: Search by username or email
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: Page size
          default: 50
          title: Limit
        description: Page size
      - name: cursor
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Opaque cursor
          title: Cursor
        description: Opaque cursor
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CursorPage_UserModel_'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/admins/users/{user_id}/ban:
    post:
      tags:
      - Admins
      summary: Ban or unban a user
      operationId: set_ban_api_v1_admins_users__user_id__ban_post
      security:
      - HTTPBearer: []
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: User Id
      - name: banned
        in: query
        required: false
        schema:
          type: boolean
          description: Set to false to remove ban
          default: true
          title: Banned
        description: Set to false to remove ban
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserModel'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/admins/users/{user_id}/roles:
    put:
      tags:
      - Admins
      summary: Assign roles to user
      operationId: set_roles_api_v1_admins_users__user_id__roles_put
      security:
      - HTTPBearer: []
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: User Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRolesUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserModel'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
