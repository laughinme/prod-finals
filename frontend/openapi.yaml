            format: uuid
          - type: 'null'
    BlockResponse:
      type: object
      additionalProperties: false
      required:
      - target_user_id
      - status
      - conversation_closed
      - match_closed
      - removed_from_future_feed
      properties:
        target_user_id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - blocked
        conversation_closed:
          type: boolean
        match_closed:
          type: boolean
        removed_from_future_feed:
          type: boolean
    ReportRequest:
      type: object
      additionalProperties: false
      required:
      - target_user_id
      - source_context
      - category
      - also_block
      properties:
        target_user_id:
          type: string
          format: uuid
        source_context:
          type: string
          enum:
          - feed
          - match_list
          - conversation
          - safety_sheet
        category:
          type: string
          enum:
          - harassment
          - fraud
          - spam
          - fake_profile
          - inappropriate_content
          - other
        description:
          anyOf:
          - type: string
            maxLength: 1000
          - type: 'null'
        related_message_id:
          anyOf:
          - type: string
          - type: 'null'
        also_block:
          type: boolean
        client_event_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
    ReportResponse:
      type: object
      additionalProperties: false
      required:
      - report_id
      - status
      - also_block_applied
      properties:
        report_id:
          type: string
        status:
          type: string
          enum:
          - accepted
        also_block_applied:
          type: boolean
    AuditEvent:
      type: object
      additionalProperties: false
      required:
      - event_id
      - event_type
      - entity_type
      - entity_id
      - actor_user_id
      - created_at
      - payload
      properties:
        event_id:
          type: string
          format: uuid
        event_type:
          type: string
        entity_type:
          type: string
        entity_id:
          type: string
        actor_user_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
        created_at:
          type: string
          format: date-time
        payload:
          type: object
          additionalProperties: true
    AuditEventsResponse:
      type: object
      additionalProperties: false
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AuditEvent'
          maxItems: 200
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
      - error_code
      - message
      - trace_id
      properties:
        error_code:
          type: string
          example: invalid_request
        message:
          type: string
        details:
          type: object
          additionalProperties: true
        trace_id:
          type: string
          format: uuid
  securitySchemes:
    HTTPBearer:
      type: http
      description: Access token must be passed as Bearer to authorize request
      scheme: bearer
