services:
  postgres-test:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: templatepg_test
    ports:
      - "5439:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis-test:
    image: redis:8-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-test:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"
      - "9003:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-test-init:
    image: minio/mc
    depends_on:
      minio-test:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -ec
      - |
        until mc alias set local http://minio-test:9000 minioadmin minioadmin; do sleep 1; done
        mc mb --ignore-existing local/media-public
        mc mb --ignore-existing local/media-private
        mc anonymous set download local/media-public
    restart: "no"
