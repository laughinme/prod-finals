services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  ml-service:
    build:
      context: .
      dockerfile: ml/Dockerfile
    container_name: ml-service
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8080
      QDRANT_URL: http://qdrant:6333  
      ML_SERVICE_TOKEN: dev-ml-token
      ML_SAMPLE_USER_COUNT: 120
      ML_SAMPLE_TX_PER_USER: 20
      ML_SAMPLE_SEED: 42
      ML_FEATURES_VERSION: features_v1
      ML_MODEL_ARTIFACT_PATH: /app/ml/artifacts/model.json
      ML_TRAIN_ON_START: "true" 
      ML_TRAIN_DATA_PATH: /app/ml/data/train.csv 
    volumes:
      - ml_artifacts:/app/ml/artifacts
      - ml_data:/app/ml/data
    ports:
      - "8081:8080"
    depends_on:
      - qdrant 
    restart: unless-stopped


  minio:
    image: minio/minio
    container_name: ${COMPOSE_PROJECT_NAME:-chupapis}-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-change-me}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-change-me}
    volumes:
      - minio_data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -ec
      - |
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do sleep 1; done
        mc mb --ignore-existing local/${STORAGE_PUBLIC_BUCKET:-media-public}
        mc mb --ignore-existing local/${STORAGE_PRIVATE_BUCKET:-media-private}
        mc anonymous set download local/${STORAGE_PUBLIC_BUCKET:-media-public}
        echo 'MinIO buckets are ready'
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-change-me}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-change-me}
      STORAGE_PUBLIC_BUCKET: ${STORAGE_PUBLIC_BUCKET:-media-public}
      STORAGE_PRIVATE_BUCKET: ${STORAGE_PRIVATE_BUCKET:-media-private}
    restart: "no"

volumes:
  caddy_config:
  caddy_data:
  postgres_data:
  redis_data:
  minio_data:
  ml_artifacts:
  ml_data:
  qdrant_data:
