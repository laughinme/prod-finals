  centrifugo:
    image: centrifugo/centrifugo:latest
    container_name: ${COMPOSE_PROJECT_NAME:-monolith-template}-centrifugo
    environment:
      CENTRIFUGO_CLIENT_TOKEN_HMAC_SECRET_KEY: dev-centrifugo-token-secret-change-me
      CENTRIFUGO_CLIENT_ALLOWED_ORIGINS: http://localhost http://127.0.0.1
      CENTRIFUGO_HTTP_API_KEY: dev-centrifugo-api-key-change-me
      CENTRIFUGO_ADMIN_ENABLED: "false"
      CENTRIFUGO_ENGINE_TYPE: memory
    ports:
      - "8000:8000"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-monolith-template}-backend
    environment:
      APP_STAGE: dev
      DEBUG: "true"
      API_HOST: 0.0.0.0
      API_PORT: 8080
      SITE_URL: http://localhost
      MAX_PHOTO_SIZE: 5
      DATABASE_URL: postgresql+asyncpg://postgres:secret@db:5432/templatepg
      REDIS_URL: redis://redis:6379/0
      ML_SERVICE_URL: http://ml-service:8080
      ML_SERVICE_TOKEN: dev-ml-token
      STORAGE_ENDPOINT_INTERNAL: http://minio:9000
      STORAGE_ENDPOINT_PUBLIC: http://localhost:9000
      STORAGE_REGION: us-east-1
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_PUBLIC_BUCKET: media-public
      STORAGE_PRIVATE_BUCKET: media-private
      STORAGE_PRESIGN_EXPIRES_SEC: 600
      STORAGE_USE_PATH_STYLE: "true"
      STORAGE_AUTO_CREATE_BUCKETS: "true"
      JWT_SECRET: dev-jwt-secret-for-local-please-change-123
      JWT_ALGO: HS256
      CSRF_HMAC_KEY: dev-csrf-hmac-for-local-please-change-123
      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: lax
      COOKIE_DOMAIN: ""
      COOKIE_PATH: /
      CORS_ALLOW_ORIGINS: http://localhost,http://localhost:80
      CORS_ALLOW_ORIGIN_REGEX: ""
      NOTIFICATIONS_PROVIDER: noop
      DEV_SEED_ENABLED: "false"
      CENTRIFUGO_ENABLED: "true"
      CENTRIFUGO_API_URL: http://centrifugo:8000/api/publish
      CENTRIFUGO_WS_URL: ""
      CENTRIFUGO_API_KEY: dev-centrifugo-api-key-change-me
      CENTRIFUGO_TOKEN_HMAC_SECRET: dev-centrifugo-token-secret-change-me
      CENTRIFUGO_TOKEN_TTL_SEC: 900
      SCHEDULER_ENABLED: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      centrifugo:
        condition: service_started
    ports:
      - "8080:8080"
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: ${COMPOSE_PROJECT_NAME:-monolith-template}-nginx
    depends_on:
      backend:
        condition: service_started
      minio:
        condition: service_started
      centrifugo:
        condition: service_started
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
