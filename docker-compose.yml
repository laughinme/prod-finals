services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  ml-service:
    build:
      context: .
      dockerfile: ml/Dockerfile
    container_name: ml-service
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8080
      QDRANT_URL: http://qdrant:6333  
      ML_SERVICE_TOKEN: dev-ml-token
      ML_SAMPLE_USER_COUNT: 120
      ML_SAMPLE_TX_PER_USER: 20
      ML_SAMPLE_SEED: 42
      ML_FEATURES_VERSION: features_v1
      ML_MODEL_ARTIFACT_PATH: /app/ml/artifacts/model.json
      ML_TRAIN_ON_START: "true" 
      ML_TRAIN_DATA_PATH: /app/ml/data/train.csv 
    volumes:
      - ml_artifacts:/app/ml/artifacts
      - ml_data:/app/ml/data
    ports:
      - "8081:8080"
    depends_on:
      - qdrant 
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ml_artifacts:
  ml_data:
  qdrant_data: